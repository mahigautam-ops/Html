<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkbox</title>
</head>
<body>
    <form >
        <label for="c">C</label>
        <input type="checkbox" id="c" name="Language" value="c"><br>
        <label for="java">java</label>
        <input type="checkbox" id="java" name="Language" value="java"><br>
        <label for="python">python</label>
        <input type="checkbox" id="python" name="Language" value="python"><br>
    </form>
</body>
</html>
